name: Deploy Shinylive App to GitHub Pages

on:
  push:
    branches: [ "main", "master" ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libuv1-dev libarchive-dev

      - name: Install R Packages
        run: |
          Rscript -e "install.packages(c('shinylive', 'lme4', 'emmeans', 'bslib'), repos = 'https://cran.rstudio.com/')"
          
      - name: Build Shinylive App
        run: |
          # This compiles your app.R in the root directory ('.') into a new '_site' folder
          Rscript -e "shinylive::export('.', '_site')"

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4